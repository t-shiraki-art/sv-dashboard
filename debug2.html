<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デバッグ2</title>
<style>
body{font-family:sans-serif;padding:20px}
.btn-yoshin{background:#2563eb!important;color:#fff!important;border:none!important;padding:10px 20px!important;font-size:16px!important;border-radius:6px!important;cursor:pointer!important;display:block;margin:10px 0;width:200px}
#log{margin-top:20px;padding:10px;background:#f0f0f0;min-height:100px;font-size:14px}
</style>
</head>
<body>
<h2>デバッグ2</h2>
<button class="btn-yoshin" data-id="123">要因分析作成</button>
<div id="log"><p>ログ待機中...</p></div>
<script>
var log = document.getElementById('log');
function addLog(msg){
  log.innerHTML += '<p>' + msg + '</p>';
}

document.addEventListener('touchstart', function(e){
  var t = e.target;
  addLog('touchstart on: ' + t.tagName + ' class=' + t.className);
  // 親をたどる
  var b = t;
  var found = false;
  while(b && b.tagName){
    addLog('checking: ' + b.tagName + ' class=' + (b.className||''));
    if(b.className && b.className.indexOf('btn-yoshin') >= 0){
      found = true;
      e.preventDefault();
      addLog('FOUND btn-yoshin! data-id=' + b.getAttribute('data-id'));
      break;
    }
    b = b.parentNode;
  }
  if(!found) addLog('btn-yoshin NOT found');
}, {passive:false});
</script>
</body>
</html>
