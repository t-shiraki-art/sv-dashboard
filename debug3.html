<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デバッグ3</title>
<style>
body{font-family:sans-serif;padding:20px}
.btn-yoshin{background:#2563eb;color:#fff;border:none;padding:12px 20px;font-size:16px;border-radius:6px;cursor:pointer;display:block;margin:10px 0;width:100%}
#yoshin-modal{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.7);
  z-index:9999;
}
#yoshin-modal.open{
  display:block !important;
}
#modal-inner{
  background:#fff;
  margin:60px 20px 20px;
  padding:20px;
  border-radius:8px;
}
#log{margin-top:20px;padding:10px;background:#f0f0f0;font-size:13px}
</style>
</head>
<body>
<h2>デバッグ3</h2>
<button class="btn-yoshin" data-id="210">要因分析作成</button>
<div id="log">ログ:</div>

<div id="yoshin-modal">
  <div id="modal-inner">
    <h3>モーダルタイトル</h3>
    <p id="yoshin-modal-title">ここにタイトル</p>
    <input id="y-p20-rank" type="number" placeholder="P20順位">
    <div id="yoshin-error"></div>
    <br>
    <button onclick="document.getElementById('yoshin-modal').classList.remove('open');document.getElementById('yoshin-modal').style.display='none';" style="padding:10px 20px;font-size:16px">閉じる</button>
  </div>
</div>

<script>
var allRecords = [{id:210,note:'テスト店',sv:'テストSV',store:'TEST001',p20_rank:5}];
window.allRecords = allRecords;

var log = document.getElementById('log');
function addLog(msg){log.innerHTML += '<p>' + new Date().toLocaleTimeString() + ': ' + msg + '</p>';}

function storeName(id){ return 'テスト店'; }
function switchYoshinTab(t){ addLog('tab: '+t); }

function openYoshinModal(r, callerPage) {
  addLog('openYoshinModal id='+r.id);
  try {
    document.getElementById('yoshin-modal-title').textContent = r.note;
    document.getElementById('y-p20-rank').value = r.p20_rank || '';
    document.getElementById('yoshin-error').textContent = '';
    // display:blockで強制表示
    var modal = document.getElementById('yoshin-modal');
    modal.style.display = 'block';
    modal.classList.add('open');
    addLog('modal.style.display=' + modal.style.display);
    addLog('modal.className=' + modal.className);
  } catch(err) {
    addLog('エラー: ' + err.message);
  }
}

document.querySelectorAll('.btn-yoshin').forEach(function(btn){
  btn.addEventListener('touchend', function(e){
    e.preventDefault();
    addLog('touchend');
    var id = parseInt(btn.getAttribute('data-id'));
    var r = allRecords.filter(function(x){return x.id===id;})[0];
    if(r){ setTimeout(function(){ openYoshinModal(r,'records'); }, 50); }
  });
  btn.addEventListener('click', function(e){
    addLog('click');
    var id = parseInt(btn.getAttribute('data-id'));
    var r = allRecords.filter(function(x){return x.id===id;})[0];
    if(r){ openYoshinModal(r,'records'); }
  });
});
addLog('準備完了');
</script>
</body>
</html>
